version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Permite que Jenkins ejecute comandos Docker en el host
      - /var/run/docker.sock:/var/run/docker.sock
    # Permite usar "host.docker.internal" para conectar con la Raspberry Pi
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  jenkins_home:
